<div class="container">
  <div class="card">
    <h2>Deposit Money</h2>

    <form (ngSubmit)="deposit()">

      <div class="form-group">
        <label>Account ID</label>
        <input type="number"
               [(ngModel)]="accountId"
               name="accountId"
               required>
      </div>

      <div class="form-group">
        <label>Amount</label>
        <input type="number"
               [(ngModel)]="amount"
               name="amount"
               required>
      </div>

      <div class="message"
           [ngClass]="messageType"
           [style.display]="message ? 'block' : 'none'">
        {{ message }}
      </div>

      <button class="btn btn-primary"
              type="submit"
              [disabled]="loading">
        {{ loading ? 'Processing...' : 'Deposit' }}
      </button>

    </form>
  </div>
</div>
