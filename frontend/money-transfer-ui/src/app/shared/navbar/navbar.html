<header class="navbar-fixed">
  <div class="navbar-inner">

    @if (!isHomePage()) {
        <div class="nav-left">
            <span class="brand">Money Transfer System</span>
        </div>
    } @else {
        <div class="nav-left">
            <!-- <a routerLink="/" class="nav-link">Money Transfer System</a> -->
        </div>
    }

    <div class="nav-right">

        @if (!auth.isAuthenticated()) {
            <a routerLink="/" class="nav-link">Home</a>
            <a routerLink="/login" class="nav-link">Login</a>
            <a routerLink="/register" class="nav-link">Register</a>
        }

        @if (auth.isAuthenticated()) {
            <a [routerLink]="getDashboardRoute()" class="nav-link">Dashboard</a>
            <a class="nav-link logout-btn" (click)="openLogoutModal()">Logout</a>
        }

        <!-- Dark mode toggle -->
        <button class="nav-link theme-toggle" (click)="toggleDarkMode()" type="button">
            @if (!darkMode) {
                <!-- Moon icon (go to dark mode) -->
                <!-- <svg viewBox="0 0 24 24" class="theme-icon">
                <path
                    d="M12,22 C17.5228475,22 22,17.5228475 22,12 C22,6.4771525 17.5228475,2 12,2 C6.4771525,2 2,6.4771525 2,12 C2,17.5228475 6.4771525,22 12,22 Z M12,20.5 L12,3.5 C16.6944204,3.5 20.5,7.30557963 20.5,12 C20.5,16.6944204 16.6944204,20.5 12,20.5 Z"
                    fill="currentColor"/>
                </svg> -->
                <svg viewBox="0 0 35 35" class="theme-icon">
                    <path
                        d="M18.44,34.68a18.22,18.22,0,0,1-2.94-.24,18.18,18.18,0,0,1-15-20.86A18.06,18.06,0,0,1,9.59.63,2.42,2.42,0,0,1,12.2.79a2.39,2.39,0,0,1,1,2.41L11.9,3.1l1.23.22A15.66,15.66,0,0,0,23.34,21h0a15.82,15.82,0,0,0,8.47.53A2.44,2.44,0,0,1,34.47,25,18.18,18.18,0,0,1,18.44,34.68ZM10.67,2.89a15.67,15.67,0,0,0-5,22.77A15.66,15.66,0,0,0,32.18,24a18.49,18.49,0,0,1-9.65-.64A18.18,18.18,0,0,1,10.67,2.89Z"
                        fill="currentColor">
                    </path>
                </svg>
            } @else {
                <!-- Sun icon (go to light mode) -->
                <svg viewBox="0 0 24 24" class="theme-icon">
                <g stroke="currentColor" stroke-width="1.5" stroke-miterlimit="10">
                    <path d="M5 12H1M23 12h-4M7.05 7.05 4.222 4.222M19.778 19.778 16.95 16.95M7.05 16.95l-2.828 2.828M19.778 4.222 16.95 7.05" stroke-linecap="round"/>
                    <path d="M12 16a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z" fill="currentColor" fill-opacity=".18"/>
                    <path d="M12 19v4M12 1v4" stroke-linecap="round"/>
                </g>
                </svg>
            }

            </button>

    </div>


  </div>
</header>
