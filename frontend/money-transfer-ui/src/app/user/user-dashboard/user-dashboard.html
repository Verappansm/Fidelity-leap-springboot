<div class="navbar">
  <h2>Money Transfer System</h2>
  <div>
    <span>{{ holderName }}</span>
    <button class="btn btn-small" (click)="logout()">Logout</button>
  </div>
</div>

<div class="container">
  <div class="card">
    <h1>My Dashboard</h1>

    <div class="balance-card">
      <p>Account ID: <strong>{{ accountId }}</strong></p>
      <p>Current Balance: <strong>₹{{ balance }}</strong></p>
    </div>

    <div class="button-group">

      <button
        routerLink="transfer"
        routerLinkActive="active-link"
        #rla1="routerLinkActive"
        class="btn"
        [ngClass]="rla1.isActive ? 'btn-secondary' : 'btn-primary'">
        Transfer Money
      </button>

      <button
        routerLink="transactions"
        routerLinkActive="active-link"
        #rla2="routerLinkActive"
        class="btn"
        [ngClass]="rla2.isActive ? 'btn-secondary' : 'btn-primary'">
        Transaction History
      </button>

    </div>
  </div>
</div>

<router-outlet></router-outlet>
