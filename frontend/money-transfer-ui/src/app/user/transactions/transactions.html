<div class="container">
  <div class="card">
    <h2>Transaction History</h2>

    @if (transactions.length === 0) {
      <p>No transactions yet.</p>
    } @else {
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
               <th>
                <div class="th-filter">
                  <span>Date</span>

                  <select
                    [(ngModel)]="filters.dateRange"
                    (change)="applyFilters()"
                    class="table-filter">
                    <option value="">All</option>
                    <option value="today">Today</option>
                    <option value="yesterday">Yesterday</option>
                    <option value="week">Last 7 Days</option>
                    <option value="month">Last 30 Days</option>
                  </select>
                </div>
              </th>

              <th>
                <div class="th-filter">
                  <span>Type</span>
                  <select
                    [(ngModel)]="filters.transactionType"
                    (change)="applyFilters()"
                    class="table-filter">
                    <option value="">All</option>
                    <option value="DEBIT">Debit</option>
                    <option value="CREDIT">Credit</option>
                  </select>
                </div>
              </th>


              <th>Account</th>
              <th>Amount</th>

              <th>
                <div class="th-filter">
                  <span>Status</span>

                  <select
                    [(ngModel)]="filters.status"
                    (change)="applyFilters()"
                    class="table-filter">
                    <option value="">All</option>
                    <option value="SUCCESS">Success</option>
                    <option value="FAILED">Failed</option>
                  </select>
                </div>
              </th>
            </tr>
          </thead>

          <tbody>
            @for (tx of paginatedTransactions; track tx.id) {
              <tr>
                <td>{{ formatDate(tx.createdOn) }}</td>
                <td>
                  <span class="badge {{ tx.transactionType.toLowerCase() }}">
                    {{ tx.transactionType }}
                  </span>
                </td>
                <td>{{ getOtherAccount(tx) }}</td>
                <td>₹{{ tx.amount }}</td>
                <td>
                  <span class="badge {{ tx.status.toLowerCase() }}">
                    {{ tx.status }}
                  </span>
                </td>
              </tr>
            }
          </tbody>
        </table>
        <app-pagination
          [totalItems]="filteredTransactions.length"
          [pageSize]="pageSize"
          [currentPage]="currentPage"
          (pageChange)="onPageChange($event)">
        </app-pagination>
      </div>
    }
    <br><br>
    <!-- <button type="button" class="btn btn-secondary" routerLink="/dashboard">Dashboard</button> -->
  </div>
</div>
