<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Money Transfer System</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
    <div class="navbar">
        <h2>Money Transfer System</h2>
        <div>
            <span id="userName"></span>
            <button onclick="logout()" class="btn btn-small">Logout</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h1>My Dashboard</h1>
            <div class="balance-card">
                <p>Account ID: <strong id="accountId"></strong></p>
                <p>Current Balance: <strong id="balance">₹0.00</strong></p>
            </div>
        </div>

        <div class="card">
            <h2>Transfer Money</h2>
            <form id="transferForm">
                <div class="form-group">
                    <label for="toAccountId">To Account ID</label>
                    <input type="number" id="toAccountId" required>
                </div>

                <div class="form-group">
                    <label for="amount">Amount (₹)</label>
                    <input type="number" id="amount" step="0.01" min="0.01" required>
                </div>

                <div id="transferMessage" class="message"></div>

                <button type="submit" class="btn btn-primary">Transfer</button>
            </form>
        </div>

        <div class="card">
            <h2>Transaction History</h2>
            <div id="transactionHistory"></div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        // Check authentication
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/login.html';
        }

        // Load user info
        document.getElementById('userName').textContent = localStorage.getItem('holderName');
        document.getElementById('accountId').textContent = localStorage.getItem('accountId');

        // Load balance
        async function loadBalance() {
            const accountId = localStorage.getItem('accountId');
            try {
                const response = await apiCall(`/api/v1/accounts/${accountId}/balance`);
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('balance').textContent = '₹' + parseFloat(data.balance).toFixed(2);
                    localStorage.setItem('balance', data.balance);
                }
            } catch (error) {
                console.error('Failed to load balance:', error);
            }
        }

        // Load transaction history
        async function loadTransactions() {
            try {
                const response = await apiCall('/api/v1/transfers/history');
                if (response.ok) {
                    const transactions = await response.json();
                    displayTransactions(transactions);
                }
            } catch (error) {
                console.error('Failed to load transactions:', error);
            }
        }

        function displayTransactions(transactions) {
            const container = document.getElementById('transactionHistory');
            const accountId = parseInt(localStorage.getItem('accountId'));

            if (transactions.length === 0) {
                container.innerHTML = '<p>No transactions yet.</p>';
                return;
            }

            let html = '<table><thead><tr><th>Date</th><th>Type</th><th>Account</th><th>Amount</th><th>Status</th><th>Action</th></tr></thead><tbody>';

            transactions.forEach(tx => {
                const date = new Date(tx.createdOn).toLocaleString();
                const type = tx.transactionType;
                const otherAccount = type === 'DEBIT' ? tx.toAccountId : tx.fromAccountId;
                const amount = parseFloat(tx.amount).toFixed(2);
                const status = tx.status;

                let actionButton = '';

                // Show rollback button only for successful DEBIT transactions
                if (
                    type === 'DEBIT' &&
                    status === 'SUCCESS'
                ) {
                    actionButton = `<button onclick="requestRollback('${tx.id}')"
                                     class="btn btn-small btn-danger">
                                     Request Rollback
                                    </button>`;
                }

                html += `<tr>
                    <td>${date}</td>
                    <td><span class="badge ${type.toLowerCase()}">${type}</span></td>
                    <td>${otherAccount || 'N/A'}</td>
                    <td>₹${amount}</td>
                    <td><span class="badge ${status.toLowerCase()}">${status}</span></td>
                    <td>${actionButton}</td>
                </tr>`;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }


        async function requestRollback(transactionId) {
            const confirmAction = confirm("Are you sure you want to request rollback?");
            if (!confirmAction) return;

            try {
                const response = await apiCall(`/api/v1/transfers/${transactionId}/rollback`, {
                    method: 'POST'
                });

                if (response.ok) {
                    alert("Rollback request submitted successfully!");
                    loadTransactions();
                } else {
                    const data = await response.json();
                    alert(data.message || "Rollback request failed");
                }

            } catch (error) {
                alert("An error occurred");
            }
        }


        // Handle transfer
        document.getElementById('transferForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const transferData = {
                fromAccountId: parseInt(localStorage.getItem('accountId')),
                toAccountId: parseInt(document.getElementById('toAccountId').value),
                amount: parseFloat(document.getElementById('amount').value),
                idempotencyKey: generateUUID()
            };

            try {
                const response = await apiCall('/api/v1/transfers', {
                    method: 'POST',
                    body: JSON.stringify(transferData)
                });

                const data = await response.json();

                if (response.ok) {
                    showTransferMessage('Transfer successful!', 'success');
                    document.getElementById('transferForm').reset();
                    loadBalance();
                    loadTransactions();
                } else {
                    showTransferMessage(data.message || 'Transfer failed', 'error');
                }
            } catch (error) {
                showTransferMessage('An error occurred. Please try again.', 'error');
            }
        });

        function showTransferMessage(msg, type) {
            const messageDiv = document.getElementById('transferMessage');
            messageDiv.textContent = msg;
            messageDiv.className = 'message ' + type;
        }

        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        // Initial load
        loadBalance();
        loadTransactions();
    </script>
</body>

</html>
