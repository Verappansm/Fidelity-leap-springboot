<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Money Transfer System</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
    <div class="navbar">
        <h2>Money Transfer System - Admin</h2>
        <div>
            <span id="userName"></span>
            <button onclick="logout()" class="btn btn-small">Logout</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h1>Admin Dashboard</h1>
        </div>

        <div class="card">
            <h2>Pending Approvals</h2>
            <div id="pendingAccounts"></div>
        </div>

        <div class="card">
            <h2>Deposit Money</h2>
            <form id="depositForm">
                <div class="form-group">
                    <label for="depositAccountId">Account ID</label>
                    <input type="number" id="depositAccountId" required>
                </div>

                <div class="form-group">
                    <label for="depositAmount">Amount (₹)</label>
                    <input type="number" id="depositAmount" step="0.01" min="0.01" required>
                </div>

                <div id="depositMessage" class="message"></div>

                <button type="submit" class="btn btn-primary">Deposit</button>
            </form>
        </div>

        <div class="card">
            <h2>All Transactions</h2>
            <div id="allTransactions"></div>
        </div>

        <div class="card">
            <h2>Pending Rollback Requests</h2>
            <div id="pendingRollbacks"></div>
        </div>

        <div class="card">
            <h2>All Accounts</h2>
            <div id="allAccounts"></div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        // Check authentication
        const token = localStorage.getItem('token');
        const role = localStorage.getItem('role');
        if (!token || role !== 'ROLE_ADMIN') {
            window.location.href = '/login.html';
        }

        document.getElementById('userName').textContent = localStorage.getItem('holderName');

        // Load pending accounts
        async function loadPendingAccounts() {
            try {
                const response = await apiCall('/api/v1/admin/accounts/pending');
                if (response.ok) {
                    const accounts = await response.json();
                    displayPendingAccounts(accounts);
                }
            } catch (error) {
                console.error('Failed to load pending accounts:', error);
            }
        }

        function displayPendingAccounts(accounts) {
            const container = document.getElementById('pendingAccounts');

            if (accounts.length === 0) {
                container.innerHTML = '<p>No pending approvals.</p>';
                return;
            }

            let html = '<table><thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Actions</th></tr></thead><tbody>';

            accounts.forEach(acc => {
                html += `<tr>
                    <td>${acc.id}</td>
                    <td>${acc.holderName}</td>
                    <td>${acc.email}</td>
                    <td>
                        <button onclick="approveAccount(${acc.id})" class="btn btn-small btn-success">Approve</button>
                        <button onclick="rejectAccount(${acc.id})" class="btn btn-small btn-danger">Reject</button>
                    </td>
                </tr>`;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        async function approveAccount(accountId) {
            try {
                const response = await apiCall(`/api/v1/admin/accounts/${accountId}/approve`, {
                    method: 'POST'
                });

                if (response.ok) {
                    alert('Account approved successfully!');
                    loadPendingAccounts();
                    loadAllAccounts();
                } else {
                    const data = await response.json();
                    alert('Failed to approve: ' + (data.message || 'Unknown error'));
                }
            } catch (error) {
                alert('An error occurred');
            }
        }

        async function rejectAccount(accountId) {
            try {
                const response = await apiCall(`/api/v1/admin/accounts/${accountId}/reject`, {
                    method: 'POST'
                });

                if (response.ok) {
                    alert('Account rejected');
                    loadPendingAccounts();
                    loadAllAccounts();
                } else {
                    const data = await response.json();
                    alert('Failed to reject: ' + (data.message || 'Unknown error'));
                }
            } catch (error) {
                alert('An error occurred');
            }
        }

        // Handle deposit
        document.getElementById('depositForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const depositData = {
                accountId: parseInt(document.getElementById('depositAccountId').value),
                amount: parseFloat(document.getElementById('depositAmount').value)
            };

            try {
                const response = await apiCall('/api/v1/admin/accounts/deposit', {
                    method: 'POST',
                    body: JSON.stringify(depositData)
                });

                const data = await response.json();

                if (response.ok) {
                    showDepositMessage('Deposit successful!', 'success');
                    document.getElementById('depositForm').reset();
                    loadAllTransactions();
                } else {
                    showDepositMessage(data.message || 'Deposit failed', 'error');
                }
            } catch (error) {
                showDepositMessage('An error occurred', 'error');
            }
        });

        function showDepositMessage(msg, type) {
            const messageDiv = document.getElementById('depositMessage');
            messageDiv.textContent = msg;
            messageDiv.className = 'message ' + type;
        }

        // Load all transactions
        async function loadAllTransactions() {
            try {
                const response = await apiCall('/api/v1/admin/transactions');
                if (response.ok) {
                    const transactions = await response.json();
                    displayAllTransactions(transactions);
                }
            } catch (error) {
                console.error('Failed to load transactions:', error);
            }
        }

        function displayAllTransactions(transactions) {
            const container = document.getElementById('allTransactions');

            if (transactions.length === 0) {
                container.innerHTML = '<p>No transactions yet.</p>';
                return;
            }

            let html = '<table><thead><tr><th>Date</th><th>Type</th><th>From</th><th>To</th><th>Amount</th><th>Status</th></tr></thead><tbody>';

            transactions.slice(0, 20).forEach(tx => {
                const date = new Date(tx.createdOn).toLocaleString();
                html += `<tr>
                    <td>${date}</td>
                    <td><span class="badge ${tx.transactionType.toLowerCase()}">${tx.transactionType}</span></td>
                    <td>${tx.fromAccountId || 'N/A'}</td>
                    <td>${tx.toAccountId || 'N/A'}</td>
                    <td>₹${parseFloat(tx.amount).toFixed(2)}</td>
                    <td><span class="badge ${tx.status.toLowerCase()}">${tx.status}</span></td>
                </tr>`;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        // Load all accounts
        async function loadAllAccounts() {
            try {
                const response = await apiCall('/api/v1/admin/accounts');
                if (response.ok) {
                    const accounts = await response.json();
                    displayAllAccounts(accounts);
                }
            } catch (error) {
                console.error('Failed to load accounts:', error);
            }
        }

        function displayAllAccounts(accounts) {
            const container = document.getElementById('allAccounts');

            let html = '<table><thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Balance</th><th>Status</th><th>Approved</th></tr></thead><tbody>';

            accounts.forEach(acc => {
                html += `<tr>
                    <td>${acc.id}</td>
                    <td>${acc.holderName}</td>
                    <td>${acc.email}</td>
                    <td>₹${parseFloat(acc.balance).toFixed(2)}</td>
                    <td><span class="badge ${acc.status.toLowerCase()}">${acc.status}</span></td>
                    <td>${acc.approved ? '✓' : '✗'}</td>
                </tr>`;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }


        async function loadPendingRollbacks() {
            try {
                const response = await apiCall('/api/v1/admin/rollbacks/pending');
                if (response.ok) {
                    const data = await response.json();
                    displayPendingRollbacks(data);
                }
            } catch (error) {
                console.error("Failed to load rollback requests");
            }
        }

        function displayPendingRollbacks(transactions) {
            const container = document.getElementById('pendingRollbacks');

            if (transactions.length === 0) {
                container.innerHTML = "<p>No pending rollback requests.</p>";
                return;
            }

            let html = `<table>
                <thead>
                    <tr>
                        <th>Transaction ID</th>
                        <th>From</th>
                        <th>To</th>
                        <th>Amount</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>`;

            transactions.forEach(tx => {
                html += `<tr>
                    <td>${tx.id}</td>
                    <td>${tx.fromAccountId}</td>
                    <td>${tx.toAccountId}</td>
                    <td>₹${parseFloat(tx.amount).toFixed(2)}</td>
                    <td>
                        <button onclick="approveRollback('${tx.id}')" class="btn btn-small btn-success">Approve</button>
                        <button onclick="rejectRollback('${tx.id}')" class="btn btn-small btn-danger">Reject</button>
                    </td>
                </tr>`;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        async function approveRollback(transactionId) {
            try {
                const response = await apiCall(`/api/v1/admin/rollbacks/${transactionId}/approve`, {
                    method: 'POST'
                });

                if (response.ok) {
                    alert("Rollback approved!");
                    loadPendingRollbacks();
                    loadAllTransactions();
                } else {
                    const data = await response.json();
                    alert(data.message || "Approval failed");
                }
            } catch (error) {
                alert("Error approving rollback");
            }
        }

        async function rejectRollback(transactionId) {
            try {
                const response = await apiCall(`/api/v1/admin/rollbacks/${transactionId}/reject`, {
                    method: 'POST'
                });

                if (response.ok) {
                    alert("Rollback rejected");
                    loadPendingRollbacks();
                } else {
                    const data = await response.json();
                    alert(data.message || "Rejection failed");
                }
            } catch (error) {
                alert("Error rejecting rollback");
            }
        }

        // Initial load
        loadPendingAccounts();
        loadAllTransactions();
        loadAllAccounts();
        loadPendingRollbacks();
    </script>
</body>

</html>
