spring:
  application:
    name: money-transfer-system
  
  datasource:
    url: jdbc:mysql://localhost:3306/money_transfer_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}
  
# Application Configuration
app:
  account:
    minimum-balances:
      SAVINGS: 5000
      STUDENT: 0
      CURRENT: 1000
      SALARY: 0
      NRE: 10000
      NRO: 10000
      BUSINESS: 10000
      PREMIUM: 25000
      JOINT: 5000
      SENIOR: 1000
      ADMIN: 0

  rollback:
    window-minutes: 1


# Default admin user credentials (auto-created on first startup)
admin:
  default:
    email: ${ADMIN_EMAIL}
    password: ${ADMIN_PASSWORD}
    name: ${ADMIN_NAME:System Administrator}


# Enable file logging
logging:
  file:
    name: money-transfer.log
    path: logs/
  level:
    root: INFO